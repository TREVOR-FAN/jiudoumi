<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>九豆米 · 宝宝英语启蒙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  --primary:#EF476F;--secondary:#FFD166;--accent:#06D6A0;
  --brand-green:#5CB85C;--brand-teal:#3AAFA9;
  --bg:#FFF8F0;--card:#FFF;--text:#333;--text-light:#888;
  --radius-lg:24px;--radius-md:16px;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;
  max-width:430px;margin:0 auto;min-height:100vh;
  box-shadow:0 0 60px rgba(0,0,0,0.1);
}
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;display:flex;background:#fff;
  border-top:1px solid #f0f0f0;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100;
}
.tab-item{flex:1;text-align:center;color:#999;font-size:12px;padding:4px 0;cursor:pointer}
.tab-item.active{color:var(--primary)}
.tab-icon{font-size:22px;display:block;margin-bottom:2px}
.page{display:none;padding:16px 16px 100px;min-height:100vh}
.page.active{display:block}

/* Brand Logo */
.brand-logo{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.logo-mark{position:relative;width:72px;height:72px;display:flex;align-items:center;justify-content:center}
.logo-img{width:100%;height:100%;object-fit:cover;border-radius:18px}
.logo-tagline{font-family:"Snell Roundhand","Brush Script MT","STXingkai","STKaiti",cursive;font-size:15px;color:#B8860B;font-weight:500;letter-spacing:1px;white-space:nowrap}


/* Header */
.header{background:linear-gradient(135deg,#FFD166,#FFE599 60%,#FFF0C0);border-radius:0 0 48px 48px;padding:24px 16px 20px;margin:-16px -16px 0}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.date-text{font-size:12px;color:rgba(51,51,51,0.5);margin-top:6px;white-space:nowrap}
.welcome{font-size:28px;font-weight:500;color:#333;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.baby-name{color:var(--primary)}
/* Daily Parenting Quote Card */
.daily-quote-card{position:relative;background:linear-gradient(135deg,#FFF9F0,#FFF3E0,#FFECB3 95%);border-radius:20px;padding:12px 16px 10px;box-shadow:0 4px 20px rgba(255,152,0,0.12);overflow:hidden}
.daily-quote-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(255,152,0,0.08) 0%,transparent 70%);border-radius:50%}
.daily-quote-icon{font-size:28px;margin-bottom:8px;display:block}
.daily-quote-text{font-size:14px;line-height:1.6;color:#5D4037;font-weight:500;position:relative;z-index:1}
.daily-quote-text::before{content:'"';font-size:32px;color:rgba(255,152,0,0.2);position:absolute;left:-4px;top:-10px;font-family:Georgia,serif}
.daily-quote-text::after{content:'"';font-size:32px;color:rgba(255,152,0,0.2);font-family:Georgia,serif}
.daily-quote-source{margin-top:12px;font-size:12px;color:#A1887F;text-align:right;font-style:italic}
.daily-quote-source::before{content:'— '}
.info-chips{display:flex;gap:6px;flex-wrap:nowrap;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0}
.chip{display:flex;align-items:center;justify-content:center;gap:3px;background:rgba(255,255,255,0.8);padding:4px 6px;border-radius:24px;font-size:11px;color:#555;white-space:nowrap;flex:1;text-align:center;overflow:hidden}
.no-profile-banner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.7);padding:14px 16px;border-radius:16px;font-size:14px;color:#555;margin-top:8px;cursor:pointer}
.aqi-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(92,184,92,0.12);border:1px solid rgba(92,184,92,0.35);padding:1px 8px;border-radius:20px;font-size:10px;color:#388E3C;cursor:pointer;flex-shrink:0;margin-top:2px}
.aqi-val{font-weight:700;font-size:11px;color:#2E7D32}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}

/* Sections */
.section{margin-top:20px}
.section-title{font-size:20px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.item-count{font-size:13px;font-weight:400;color:#ccc;margin-left:auto}

/* Item list */
.item-list{display:flex;flex-direction:column;gap:10px}
.item-card{display:flex;align-items:center;gap:12px;background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 8px rgba(0,0,0,0.04);cursor:pointer;transition:background .15s}
.item-card:hover{background:#fafafa}

/* White Noise */
.noise-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.noise-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 8px;background:#fff;border:1.5px solid #eee;border-radius:14px;cursor:pointer;font-size:13px;color:#666;transition:all .2s}
.noise-btn .noise-icon{font-size:26px}
.noise-btn .noise-label{font-size:11px;font-weight:500}
.noise-btn.active{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-color:var(--brand-green);color:#2E7D32}
.noise-btn.active .noise-icon{animation:noisePulse 1s ease-in-out infinite}
@keyframes noisePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.noise-timer-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:12px;color:#999}
.noise-timer-row select{height:30px;padding:0 8px;border:1px solid #e0e0e0;border-radius:8px;font-size:12px;background:#fafafa;outline:none}
.noise-status{font-size:12px;color:var(--brand-green);margin-top:6px;text-align:center;min-height:18px}
.item-info{flex:1;min-width:0}
.item-title{font-size:15px;font-weight:600;color:#333;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-title-zh{font-size:11px;color:#999;display:block;margin-top:1px}
.item-meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:10px}
.item-type-label{padding:1px 8px;border-radius:8px;font-size:10px}
.label-song{color:#EF476F;background:rgba(239,71,111,0.08)}
.item-source-short{color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Play-All Button */
.play-all-bar{padding:0 0 20px}
.play-all-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px;background:linear-gradient(135deg,#EF476F,#F06888);color:#fff;font-size:18px;font-weight:700;border:none;border-radius:48px;cursor:pointer;box-shadow:0 8px 24px rgba(239,71,111,0.3);letter-spacing:2px}
.play-all-btn:hover{opacity:.92}

/* Pagination */
.pagination-row{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 0 8px}
.page-btn{padding:10px 20px;background:#fff;border:1px solid #eee;border-radius:24px;font-size:13px;color:#666;cursor:pointer;transition:all .2s}
.page-btn:hover:not(:disabled){background:#f5f5f5;border-color:#ddd}
.page-btn:disabled{opacity:.35;cursor:default}
.page-indicator{font-size:13px;color:#999;font-weight:600}

/* Profile */
.profile-title{font-size:20px;font-weight:700;margin-top:10px;text-align:center}
.profile-subtitle{font-size:13px;color:#999;margin-top:2px;text-align:center}
.form-card{background:#fff;border-radius:var(--radius-lg);padding:20px 16px;box-shadow:0 2px 16px rgba(0,0,0,0.05)}
.form-group{margin-bottom:18px}
.form-label{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.form-input{width:100%;height:42px;background:#fafafa;border:1px solid #eee;border-radius:12px;padding:0 12px;font-size:14px;outline:none}
.form-input:focus{border-color:var(--primary)}
.gender-group{display:flex;gap:10px}
.gender-opt{flex:1;text-align:center;padding:12px;border-radius:12px;background:#fafafa;border:2px solid transparent;cursor:pointer;font-size:14px}
.gender-opt.selected{background:#FFF0F3;border-color:var(--primary)}
.date-input{width:100%;height:42px;background:#fafafa;border:1px solid #eee;border-radius:12px;padding:0 12px;font-size:14px;outline:none}
.calc-row{display:flex;gap:10px;background:#FFFAF0;border-radius:12px;padding:16px;border:1px solid #F0E6DA;margin-top:2px}
.calc-item{flex:1;text-align:center}
.calc-label{font-size:10px;color:#999;margin-bottom:4px}
.calc-value{font-size:16px;font-weight:700}
.zodiac-badge{color:#D4A017}
.save-btn{width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#EF476F,#F06888);color:#fff;font-size:16px;font-weight:600;border:none;border-radius:48px;cursor:pointer;box-shadow:0 6px 20px rgba(239,71,111,0.3)}
.save-btn:hover{opacity:.92}


/* ============ PLAYER OVERLAY ============ */
.player-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(180deg,#1A1A2E,#2D2D3F);
  z-index:200;flex-direction:column;overflow:hidden;
}
.player-overlay.show{display:flex}
.player-top-bar{display:flex;justify-content:space-between;align-items:center;padding:48px 20px 16px}

.close-player-btn{background:none;border:none;color:rgba(255,255,255,0.7);font-size:28px;cursor:pointer;padding:4px}

/* Now Playing */
.now-playing{padding:0 20px 16px;text-align:center}
.now-type{font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:8px}
.now-art{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 14px;position:relative}
.now-art.song{background:linear-gradient(135deg,#EF476F,#F5958E);box-shadow:0 8px 32px rgba(239,71,111,0.35)}
.now-art.reading{background:linear-gradient(135deg,#06D6A0,#4ECDC4);box-shadow:0 8px 32px rgba(6,214,160,0.35)}
.now-art.playing{animation:artPulse 1.5s ease-in-out infinite}
.now-art.playing::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);animation:rippleOut 1.5s ease-out infinite}
.now-art.playing::after{content:'';position:absolute;inset:-14px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.15);animation:rippleOut 1.5s ease-out .5s infinite}
@keyframes artPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes rippleOut{0%{opacity:1;transform:scale(.9)}100%{opacity:0;transform:scale(1.15)}}
.now-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:2px}
.now-title-zh{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:4px}
.now-source{font-size:11px;color:rgba(255,255,255,0.35);font-style:italic}
/* Visualizer */
.visualizer{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:18px;margin:10px auto 0;opacity:0;transition:opacity .3s}
.now-art.playing~.visualizer{opacity:1}
.eq-bar{width:3px;min-height:4px;background:var(--secondary);border-radius:2px;animation:none}
.now-art.playing~.visualizer .eq-bar:nth-child(1){animation:eqBounce .5s ease-in-out infinite alternate;animation-delay:0s}
.now-art.playing~.visualizer .eq-bar:nth-child(2){animation:eqBounce .55s ease-in-out infinite alternate;animation-delay:.12s}
.now-art.playing~.visualizer .eq-bar:nth-child(3){animation:eqBounce .45s ease-in-out infinite alternate;animation-delay:.25s}
.now-art.playing~.visualizer .eq-bar:nth-child(4){animation:eqBounce .6s ease-in-out infinite alternate;animation-delay:.08s}
.now-art.playing~.visualizer .eq-bar:nth-child(5){animation:eqBounce .5s ease-in-out infinite alternate;animation-delay:.35s}
@keyframes eqBounce{0%{height:4px}100%{height:18px}}

/* Progress */
.player-progress{padding:0 20px;margin-bottom:4px}
.progress-track{height:6px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;margin-bottom:4px;cursor:pointer;padding:8px 0;-webkit-tap-highlight-color:transparent;background-clip:content-box}
.progress-fill{height:100%;background:var(--secondary);width:0%;pointer-events:none;transition:width .1s linear}

/* Time */
.song-time-row{display:flex;justify-content:space-between;padding:0 20px 2px;font-size:11px;color:rgba(255,255,255,0.5);font-variant-numeric:tabular-nums}
.song-time{font-family:monospace;font-size:12px}

/* Lyrics */
.lyrics-box{text-align:center;padding:4px 20px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;scroll-behavior:smooth}
.lyrics-box:empty{display:none}
.lyrics-line{font-size:13px;color:rgba(255,255,255,0.3);padding:5px 0;transition:color .3s,font-size .3s}
.lyrics-line.active{color:#FFD166;font-size:15px;font-weight:600}

/* Shuffle & Fav */
.shuffle-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:8px;color:rgba(255,255,255,0.3)}
.shuffle-btn.on{color:var(--secondary);background:rgba(255,209,102,0.15)}
.fav-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:rgba(255,255,255,0.25)}
.fav-btn.on{color:#EF476F}
.fav-btn.mini{font-size:14px;padding:2px 6px}
.fav-filter-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:4px 8px;border-radius:8px;color:rgba(255,255,255,0.3)}
.fav-filter-btn.on{color:#EF476F;background:rgba(239,71,111,0.15)}

/* Playlist */
.playlist-section{overflow:hidden;display:flex;flex-direction:column;padding:0 16px 24px;max-height:48px;transition:max-height .3s ease}
.playlist-section.expanded{max-height:50vh}
.playlist-header{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;cursor:pointer;border-radius:12px;background:rgba(255,255,255,0.05);min-height:40px}
.playlist-title{font-size:13px;font-weight:600;color:rgba(255,255,255,0.6)}
.playlist-expand-icon{font-size:12px;color:rgba(255,255,255,0.4);transition:transform .3s}
.playlist-section.expanded .playlist-expand-icon{transform:rotate(90deg)}
.playlist-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;margin-top:6px}
.playlist-section.expanded .playlist-scroll{display:block}
.pl-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:12px;cursor:pointer;transition:background .15s}
.pl-item:hover{background:rgba(255,255,255,0.05)}
.pl-item.current{background:rgba(255,255,255,0.1)}
.pl-item.played .pl-index{color:var(--accent)}
.pl-index{width:28px;text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.3);flex-shrink:0}
.pl-item.current .pl-index{color:var(--secondary)}
.pl-type-icon{font-size:18px;flex-shrink:0}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-item.current .pl-name{color:#fff}
.pl-type-label{font-size:10px;padding:1px 6px;border-radius:6px;display:inline-block;margin-top:2px}
.pl-song-label{color:#EF476F;background:rgba(239,71,111,0.15)}
.pl-reading-label{color:#06D6A0;background:rgba(6,214,160,0.15)}
.pl-dur{font-size:11px;color:rgba(255,255,255,0.3);flex-shrink:0}

.section-subtitle{text-align:center;padding:0 0 14px;font-size:11px;color:#999;line-height:1.7}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:300;display:none}
.toast.show{display:block;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.9)}}

</style>
</head>
<body>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="home"><span class="tab-icon">🏠</span>Harvard/Oxford每日精选</div>
  <div class="tab-item" data-tab="profile"><span class="tab-icon">👶</span>宝宝档案</div>
</div>

<!-- ========== HOME PAGE ========== -->
<div class="page active" id="page-home">
  <div class="header">
    <div class="header-row">
      <div class="brand-logo">
        <div class="logo-mark"><img src="images/logo.png" class="logo-img" alt="九豆米"></div>
        <span class="logo-tagline">欢迎来到豆比爸比电台</span>
      </div>
      <div class="header-right">
        <span class="date-text" id="today-date"></span>
        <div class="aqi-badge" id="aqi-badge" style="display:none" onclick="showAQIInfo(event)">🌬 <span id="aqi-val"></span></div>
      </div>
    </div>
    <div class="welcome" id="welcome-line"></div>
    <div class="info-chips" id="info-chips"></div>
    <div class="no-profile-banner" id="no-profile-banner" onclick="switchTab('profile')"><span>📋</span> 点击设置宝宝档案，获得个性化推荐 →</div>
  </div>

  <div class="section" id="daily-quote-section">
    <div class="section-title"><span>💡</span> 科学育儿语录</div>
    <div class="daily-quote-card" id="daily-quote-card">
      <div class="daily-quote-text" id="daily-quote-text"></div>
      <div class="daily-quote-source" id="daily-quote-source"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span>💤</span> 白噪音 · 助眠</div>
    <div class="noise-grid" id="noise-grid">
      <div class="noise-btn" data-noise="white" onclick="toggleNoise('white',this)"><span class="noise-icon">🌬</span><span class="noise-label">白噪音</span></div>
      <div class="noise-btn" data-noise="pink" onclick="toggleNoise('pink',this)"><span class="noise-icon">🌿</span><span class="noise-label">粉红噪音</span></div>
      <div class="noise-btn" data-noise="brown" onclick="toggleNoise('brown',this)"><span class="noise-icon">🌊</span><span class="noise-label">棕噪音</span></div>
      <div class="noise-btn" data-noise="rain" onclick="toggleNoise('rain',this)"><span class="noise-icon">🌧</span><span class="noise-label">雨声</span></div>
      <div class="noise-btn" data-noise="ocean" onclick="toggleNoise('ocean',this)"><span class="noise-icon">🏖</span><span class="noise-label">海浪</span></div>
      <div class="noise-btn" data-noise="fan" onclick="toggleNoise('fan',this)"><span class="noise-icon">💨</span><span class="noise-label">风扇</span></div>
    </div>
    <div class="noise-timer-row">
      <span>⏱ 定时关闭：</span>
      <select id="noise-timer" onchange="onNoiseTimerChange()">
        <option value="0">关闭定时</option>
        <option value="15">15分钟</option>
        <option value="30" selected>30分钟</option>
        <option value="60">60分钟</option>
        <option value="90">90分钟</option>
      </select>
    </div>
    <div class="noise-status" id="noise-status"></div>
  </div>

  <div class="section">
    <div class="section-title"><span>🎧</span> Harvard/Oxford每日精选 <span class="item-count" id="item-count"></span></div>
    <div class="section-subtitle">内容来自哈佛、牛津等世界顶级育儿专家推荐<br>每日更新 · 为宝宝精选最好的英语启蒙</div>
    <div class="play-all-bar">
      <button class="play-all-btn" id="play-all-btn" onclick="openPlayer(0)">▶ 全部播放 · 20首</button>
    </div>
    <div class="item-list" id="item-list"></div>
  </div>

</div>

<!-- ========== PROFILE PAGE ========== -->
<div class="page" id="page-profile">
  <div style="display:flex;justify-content:center;padding:12px 0 4px">
    <div class="brand-logo"><div class="logo-mark" style="width:56px;height:56px"><img src="images/logo.png" class="logo-img" alt="九豆米"></div></div>
  </div>
  <div class="profile-title" id="profile-header-title">设置宝宝档案</div>
  <div class="profile-subtitle">完善信息以获得个性化每日推荐</div>
  <div class="form-card">
    <div class="form-group"><div class="form-label"><span>✏️</span> 宝宝名字</div><input class="form-input" id="input-name" placeholder="请输入宝宝的小名" maxlength="10"></div>
    <div class="form-group"><div class="form-label"><span id="gender-icon">👦</span> 性别</div><div class="gender-group"><div class="gender-opt selected" data-gender="boy" onclick="selectGender('boy',this)">👦 男宝</div><div class="gender-opt" data-gender="girl" onclick="selectGender('girl',this)">👧 女宝</div></div></div>
    <div class="form-group"><div class="form-label"><span>🎂</span> 出生日期</div><input type="date" class="date-input" id="input-birthdate" onchange="onDateChange()"></div>
    <div class="calc-row" id="calc-row" style="display:none"><div class="calc-item"><div class="calc-label">生肖</div><div class="calc-value zodiac-badge" id="zodiac-display">—</div></div><div class="calc-item"><div class="calc-label">星座</div><div class="calc-value" id="constellation-display" style="color:#6C5CE7">—</div></div><div class="calc-item"><div class="calc-label">月龄</div><div class="calc-value" id="age-display">—</div></div></div>

function seededRandom(seed){let h=0;for(let i=0;i<seed.length;i++)h=Math.imul(31,h)+seed.charCodeAt(i)|0;return function(){h|=0;h=h+0x6D2B79F5|0;let t=Math.imul(h^h>>>15,1|h);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function shuffle(arr,seed){const r=[...arr],rand=seededRandom(seed);for(let i=r.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

// Developmental stage tags per age band (early childhood language acquisition research)
function getStageTags(am){
  if(am<=6)return['lullaby','bedtime','soothing','calming','bonding','gentle','touch','comfort'];
  if(am<=12)return['animals','sounds','action','movement','rhythm','body','peekaboo','clapping','fingerplay','interactive'];
  if(am<=18)return['counting','vocabulary','animals','colors','body','action','interactive','rhyme','sounds','numbers'];
  if(am<=24)return['story','adventure','imagination','emotion','community','food','nature','classic','rhyme','counting'];
  return['alphabet','phonics','literacy','math','numbers','social','identity','self-esteem','perseverance','coordination','dance','emotion','adventure','story'];
}
function scoreItem(item,ageMonths,zodiac,gender,stageTags){
  let s=0;
  const mid=(item.ageRange[0]+item.ageRange[1])/2;
  const dist=Math.abs(ageMonths-mid);
  s+=(dist<=2?5:dist<=4?4:dist<=6?3:dist<=12?2:1)*3;
  let st=0; if(item.tags)for(const t of item.tags)if(stageTags.includes(t))st++;
  s+=Math.min(st,4)*2;
  if(item.zodiacAffinity&&zodiac&&item.zodiacAffinity.includes(zodiac))s+=3;
  if(item.tags&&gender==='boy'&&item.tags.includes('adventure'))s+=1;
  if(item.tags&&gender==='girl'&&item.tags.includes('love'))s+=1;
  if(item.tags&&(item.tags.includes('phonics')||item.tags.includes('rhyme')))s+=1;
  if(item.tags&&(item.tags.includes('alphabet')||item.tags.includes('literacy')))s+=2;
  return s;
}

function getDailyRecommendations(profile){
  const today=new Date();
  const ds=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const eff=((profile&&profile.birthDate)?profile:{birthDate:null,zodiac:'',gender:''});
  const ageMonths=eff.birthDate?getAgeMonths(eff.birthDate):9;
  const zodiac=eff.zodiac||''; const gender=eff.gender||'';
  const all=songs.map(s=>({...s,contentType:'song'}));
  let filtered=all.filter(i=>ageMonths>=i.ageRange[0]-6&&ageMonths<=i.ageRange[1]+6);
  if(filtered.length<20)filtered=all;
  const stageTags=getStageTags(ageMonths);
  const scored=filtered.map(i=>({item:i,score:scoreItem(i,ageMonths,zodiac,gender,stageTags)})).sort((a,b)=>b.score-a.score);
  const babyId=eff.birthDate?`${eff.birthDate}-${eff.gender}`:'default';
  const seed=`${babyId}-${ds}`;
  const sel=[]; let rem=[...scored];
  while(sel.length<20&&rem.length>0){
    const ts=rem[0].score;
    const tier=rem.filter(r=>r.score===ts);
    const sh=shuffle(tier.map(r=>r.item),seed+'-'+sel.length);
    const take=Math.min(sh.length,20-sel.length);
    sel.push(...sh.slice(0,take));
    rem=rem.filter(r=>r.score!==ts);
  }
  return{items:sel.slice(0,20)};
}

function getDailyTip(){
  const now=new Date();
  const dayOfYear=Math.floor((now-new Date(now.getFullYear(),0,0))/86400000);
  const full=parentingTips[dayOfYear%parentingTips.length];
  const idx=full.lastIndexOf('—');
  if(idx>0) return {text:full.slice(0,idx).trim(), source:full.slice(idx+1).trim()};
  return {text:full, source:''};
}

document.getElementById('song-progress-track').addEventListener('click',(e)=>{
  if(!neAudio.duration||!isFinite(neAudio.duration))return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  neAudio.currentTime=pct*neAudio.duration;
});

function fmtTime(sec){
  if(!isFinite(sec)||sec<0)return'0:00';
  const m=Math.floor(sec/60);
  const s=Math.floor(sec%60);
  return m+':'+String(s).padStart(2,'0');
}

function updateLyrics(){
  const item=playlist[currentIndex];
  if(!item||!item.lyrics)return;
  const lines=item.lyrics.split('\n');
  if(lines.length<2)return;
  const lineIdx=Math.min(Math.floor(neAudio.currentTime/neAudio.duration*lines.length),lines.length-1);
  const box=document.getElementById('lyrics-box');
  // Only toggle classes, don't rebuild DOM
  const els=box.querySelectorAll('.lyrics-line');
  els.forEach((el,i)=>{
    if(i===lineIdx)el.classList.add('active');
    else el.classList.remove('active');
  });
  // Scroll active line to center
  const active=box.querySelector('.lyrics-line.active');
  if(active){
    const boxH=box.clientHeight;
    const lineTop=active.offsetTop;
    const scrollTo=lineTop-boxH/2+active.clientHeight/2;
    box.scrollTo({top:Math.max(0,scrollTo),behavior:'smooth'});
  }
}

  if(neAudio.src.endsWith(params.toString())){
    // Same song — just resume if paused
    if(neAudio.paused)neAudio.play().catch(()=>{});
    return;
  }
  neAudio.src=url;
  neAudio.load();
  neAudio.play().catch(()=>{});
}

function stopNetEase(){
  neAudio.pause();
  if(neAdvanceTimer){clearTimeout(neAdvanceTimer);neAdvanceTimer=null;}
}

function preloadFirstSong(){
  if(!playlist.length)return;
  const item=playlist[0];
  if(!item.neteaseId)return;
  const params=new URLSearchParams();
  params.set('id',item.id);
  params.set('neid',item.neteaseId);
  params.set('title',item.title);
  neAudio.src='/api/stream?'+params.toString();
  neAudio.load();  // start buffering, don't play — keeps data ready for first click
}

function scheduleAdvance(durationSec){
  if(neAdvanceTimer)clearTimeout(neAdvanceTimer);
  neAdvanceTimer=setTimeout(()=>{
    if(isPlaying&&!neAudio.paused)advanceTrack();
  },(durationSec+2)*1000);
}

// ==================== PLAYER ====================
function openPlayer(startIndex){
  if(playlist.length===0){showToast('暂无歌曲');return;}
  currentIndex=Math.max(0,Math.min(startIndex,playlist.length-1));
  isPlaying=true;
  playlistExpanded=false;
  document.getElementById('playlist-section').classList.remove('expanded');
  document.getElementById('playlist-expand-icon').textContent='▸';
  stopPlayback();
  playCurrent();
  document.getElementById('player-overlay').classList.add('show');
  renderPlaylist();
  updatePlayerUI();
}

function closePlayer(){
  stopPlayback();
  isPlaying=false;
  document.getElementById('player-overlay').classList.remove('show');
}

function stopPlayback(){
  stopNetEase();
}


function playCurrent(){
  if(!isPlaying||currentIndex>=playlist.length)return;
  const item=playlist[currentIndex];
  updatePlayerUI();
  updatePlaylistHighlight();
  scrollPlaylistToCurrent();

  if(item.neteaseId){
    playNetEase(item.neteaseId, item.id, item.title);
    scheduleAdvance(item.duration||60);
  }else{
    if(isPlaying)advanceTrack();
  }
}

function advanceTrack(){
  if(isShuffle&&playlist.length>1){
    let next;do{next=Math.floor(Math.random()*playlist.length);}while(next===currentIndex);
    currentIndex=next;
  }else if(currentIndex<playlist.length-1){
    currentIndex++;
  }else{
    currentIndex=0;
  }
  updatePlayerUI();
  updatePlaylistHighlight();
  scrollPlaylistToCurrent();
  playCurrent();
}




function togglePlay(){
  isPlaying=!isPlaying;
  if(isPlaying){
    playCurrent();
  }else{
    stopPlayback();
  }
  updatePlayerUI();
}


function updatePlayerUI(){
  if(currentIndex>=playlist.length)return;
  const item=playlist[currentIndex];
  document.getElementById('now-type').textContent='🎵 儿歌';
  const art=document.getElementById('now-art');
  art.className='now-art song'+(isPlaying?' playing':'');
  art.textContent='🎵';
  document.getElementById('now-title').innerHTML=item.title+' <button class="fav-btn" data-song-id="'+item.id+'" onclick="toggleFavorite(\''+item.id+'\',event)" style="font-size:20px;vertical-align:middle">'+(isFavorite(item.id)?'⭐':'☆')+'</button>';
  document.getElementById('now-title-zh').textContent=item.titleZh||'';
  document.getElementById('now-source').textContent=item.source||'';

  // Lyrics: render DOM once, keep it stable for scrolling
  const lb=document.getElementById('lyrics-box');
  if(item.lyrics){
    const lines=item.lyrics.split('\n');
    lb.innerHTML=lines.map((l,i)=>`<div class="lyrics-line${i===0?' active':''}" data-line="${i}">${l}</div>`).join('');
    lb.scrollTop=0;
  }else{lb.innerHTML='';}

  // Playlist collapsed label
  document.getElementById('playlist-collapsed-label').textContent=`📋 ${currentIndex+1} / ${playlist.length}`;
  // Shuffle/fav button states
  document.getElementById('shuffle-btn').classList.toggle('on',isShuffle);
  document.getElementById('fav-filter-btn').classList.toggle('on',favOnly);
}

function renderPlaylist(){
  const el=document.getElementById('playlist-scroll');
  const showItems=favOnly?playlist.filter((item,i)=>favorites.has(item.id)):playlist;
  if(favOnly&&showItems.length===0){
    el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.3);padding:32px">暂无收藏歌曲<br><small>点击 ☆ 收藏喜欢的歌曲</small></div>';
    return;
  }
  let h='';
  playlist.forEach((item,i)=>{
    if(favOnly&&!favorites.has(item.id))return;
    const cls=i===currentIndex?'pl-item current':(i<currentIndex?'pl-item played':'pl-item');
    h+=`<div class="${cls}" onclick="jumpToTrack(${i})">
      <span class="pl-index">${i===currentIndex?'♪':(i<currentIndex?'✓':(i+1))}</span>
      <span class="pl-type-icon">🎵</span>
      <div class="pl-info">
        <span class="pl-name">${item.title}</span>
        <span class="pl-type-label pl-song-label">儿歌</span>
      </div>
      <button class="fav-btn mini" data-song-id="${item.id}" onclick="toggleFavorite('${item.id}',event)">${isFavorite(item.id)?'⭐':'☆'}</button>
      <span class="pl-dur">${Math.floor((item.duration||0)/60)}′${String(Math.floor((item.duration||0)%60)).padStart(2,'0')}″</span>
    </div>`;
  });
  el.innerHTML=h;
}

function updatePlaylistHighlight(){
  const items=document.querySelectorAll('.pl-item');
  items.forEach((el,i)=>{
    el.className='pl-item';
    if(i===currentIndex)el.classList.add('current');
    if(i<currentIndex)el.classList.add('played');
  });
  // Update index numbers
  document.querySelectorAll('.pl-index').forEach((el,i)=>{
    el.textContent=i<currentIndex?'✓':String(i+1);
  });
}

function scrollPlaylistToCurrent(){
  const el=document.querySelector('.pl-item.current');
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

function jumpToTrack(i){
  stopPlayback();
  currentIndex=i;
  updatePlayerUI();
  renderPlaylist();
  updatePlaylistHighlight();
  if(!isPlaying){isPlaying=true;}
  playCurrent();
}

// ==================== WHITE NOISE ENGINE ====================
let noiseCtx=null,noiseSource=null,noiseGain=null,noiseTimer=null,activeNoise=null;
const NOISE_INFO={white:{label:'白噪音',icon:'🌬'},pink:{label:'粉红噪音',icon:'🌿'},brown:{label:'棕噪音',icon:'🌊'},rain:{label:'雨声',icon:'🌧'},ocean:{label:'海浪',icon:'🏖'},fan:{label:'风扇',icon:'💨'}};

function createNoiseBuffer(type,duration,ctx){
  const sr=ctx.sampleRate,len=sr*duration;
  const buf=ctx.createBuffer(1,len,sr);
  const data=buf.getChannelData(0);
  if(type==='white'){for(let i=0;i<len;i++)data[i]=Math.random()*2-1;}
  else if(type==='pink'){
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<len;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;data[i]=(b0+b1+b2+b3+b4+b5+w*0.5362)*0.11;b6=w*0.115926;}
  }else if(type==='brown'){
    let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;data[i]=(last+0.02*w)/1.02;last=data[i];data[i]*=3.5;}
  }else if(type==='rain'){
    for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*0.6;
  }else if(type==='ocean'){
    let last=0;for(let i=0;i<len;i++){const w=Math.random()*2-1;data[i]=(last+0.008*w)/1.008;last=data[i];data[i]*=2;}
  }else if(type==='fan'){
    for(let i=0;i<len;i++){const t=i/sr;data[i]=Math.sin(2*Math.PI*80*t)*0.3+Math.sin(2*Math.PI*120*t)*0.2+(Math.random()*2-1)*0.1;}
  }
  return buf;
}

function startNoise(type){
  noiseCtx=new(window.AudioContext||window.webkitAudioContext)();
  const buf=createNoiseBuffer(type,3,noiseCtx);
  noiseSource=noiseCtx.createBufferSource();
  noiseSource.buffer=buf;noiseSource.loop=true;
  noiseGain=noiseCtx.createGain();
  noiseGain.gain.setValueAtTime(0,noiseCtx.currentTime);
  noiseGain.gain.linearRampToValueAtTime(0.45,noiseCtx.currentTime+0.8);
  noiseSource.connect(noiseGain);
  noiseGain.connect(noiseCtx.destination);
  if(type==='rain'){const lfo=noiseCtx.createOscillator();lfo.frequency.setValueAtTime(0.4,noiseCtx.currentTime);const lg=noiseCtx.createGain();lg.gain.setValueAtTime(0.3,noiseCtx.currentTime);lfo.connect(lg);lg.connect(noiseGain.gain);lfo.start();noiseSource._lfo=lfo;}
  if(type==='ocean'){const lfo=noiseCtx.createOscillator();lfo.frequency.setValueAtTime(0.06,noiseCtx.currentTime);const lg=noiseCtx.createGain();lg.gain.setValueAtTime(0.5,noiseCtx.currentTime);lfo.connect(lg);lg.connect(noiseGain.gain);lfo.start();noiseSource._lfo=lfo;}
  noiseSource.start();activeNoise=type;startNoiseTimer();
}

function stopNoise(){
  if(noiseTimer){clearTimeout(noiseTimer);noiseTimer=null;}
  if(noiseSource){try{noiseSource.stop();}catch(e){}if(noiseSource._lfo)try{noiseSource._lfo.stop();}catch(e){}noiseSource=null;}
  if(noiseCtx){noiseCtx.close();noiseCtx=null;}
  activeNoise=null;
  document.querySelectorAll('.noise-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('noise-status').textContent='';
}

function startNoiseTimer(){
  if(noiseTimer)clearTimeout(noiseTimer);
  const min=parseInt(document.getElementById('noise-timer').value);
  if(min>0)noiseTimer=setTimeout(()=>{stopNoise();showToast('⏰ 白噪音定时关闭');},min*60000);
}

function toggleNoise(type,el){
  if(activeNoise===type){stopNoise();return;}
  stopNoise();
  startNoise(type);
  document.querySelectorAll('.noise-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('noise-status').textContent='🔊 '+NOISE_INFO[type].label+' 播放中...';
}

function onNoiseTimerChange(){
  if(activeNoise){startNoiseTimer();const min=parseInt(document.getElementById('noise-timer').value);if(min>0)showToast('⏰ 定时'+min+'分钟后关闭');else showToast('⏰ 定时已取消');}
}

init();
</script>
